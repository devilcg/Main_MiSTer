name: Korean OSD Auto Build

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git 사용자 설정
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: upstream fetch
        run: |
          git remote add upstream https://github.com/MiSTer-devel/Main_MiSTer.git || true
          git fetch upstream master

      - name: 새 upstream 커밋 확인
        id: check
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/master)
          MERGE_BASE=$(git merge-base HEAD upstream/master)
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "merge_base=$MERGE_BASE" >> $GITHUB_OUTPUT
          if [ "$MERGE_BASE" = "$UPSTREAM_SHA" ]; then
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "업스트림 변경 없음. 스킵."
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "새 upstream 커밋 발견:"
            git log --oneline $MERGE_BASE..upstream/master
          fi

      - name: 한글 패치 추출
        if: steps.check.outputs.has_new == 'true'
        run: |
          mkdir -p /tmp/korean-patches
          git format-patch ${{ steps.check.outputs.merge_base }}..HEAD -o /tmp/korean-patches
          echo "추출된 패치 목록:"
          ls /tmp/korean-patches/

      - name: upstream 위로 rebase
        if: steps.check.outputs.has_new == 'true'
        id: rebase
        run: |
          git reset --hard upstream/master
          FAILED_PATCH=""
          for patch in $(ls /tmp/korean-patches/*.patch | sort); do
            echo "적용: $(basename $patch)"
            if ! git am "$patch"; then
              FAILED_PATCH="$(basename $patch)"
              git am --abort
              break
            fi
          done
          if [ -n "$FAILED_PATCH" ]; then
            echo "conflict=true" >> $GITHUB_OUTPUT
            echo "failed_patch=$FAILED_PATCH" >> $GITHUB_OUTPUT
          else
            echo "conflict=false" >> $GITHUB_OUTPUT
          fi

      - name: 충돌 시 이슈 생성
        if: steps.check.outputs.has_new == 'true' && steps.rebase.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const upstreamSha = '${{ steps.check.outputs.upstream_sha }}';
            const failedPatch = '${{ steps.rebase.outputs.failed_patch }}';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'rebase-conflict'
            });
            if (issues.data.length > 0) {
              console.log('충돌 이슈 이미 존재');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[자동] Rebase 충돌 - upstream ' + upstreamSha.substring(0, 7),
              body: '## 한글 패치 Rebase 충돌\n\n**충돌 패치**: `' + failedPatch + '`\n**Upstream SHA**: `' + upstreamSha + '`\n\n수동 해결 필요:\n```bash\ngit fetch upstream master\ngit rebase upstream/master\ngit push devilcg master --force\n```',
              labels: ['rebase-conflict']
            });

      - name: ARM 툴체인 설치
        if: steps.check.outputs.has_new == 'true' && steps.rebase.outputs.conflict == 'false'
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu-a/10.2-2020.11/binrel/gcc-arm-10.2-2020.11-x86_64-arm-none-linux-gnueabihf.tar.xz
          tar xf gcc-arm-10.2-2020.11-x86_64-arm-none-linux-gnueabihf.tar.xz -C /opt
          echo "/opt/gcc-arm-10.2-2020.11-x86_64-arm-none-linux-gnueabihf/bin" >> $GITHUB_PATH

      - name: 빌드 의존성 설치
        if: steps.check.outputs.has_new == 'true' && steps.rebase.outputs.conflict == 'false'
        run: sudo apt-get install -y libfreetype6-dev

      - name: MiSTer 빌드
        if: steps.check.outputs.has_new == 'true' && steps.rebase.outputs.conflict == 'false'
        run: |
          make -j$(nproc)
          ls -lh bin/MiSTer

      - name: devilcg master force push
        if: steps.check.outputs.has_new == 'true' && steps.rebase.outputs.conflict == 'false'
        run: git push origin master --force

      - name: 릴리즈 태그 생성
        if: steps.check.outputs.has_new == 'true' && steps.rebase.outputs.conflict == 'false'
        id: tag
        run: |
          DATE=$(date +'%y%m%d')
          TAG="korean-final-${DATE}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            TAG="korean-final-${DATE}-r2"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          git tag "$TAG"
          git push origin "$TAG"

      - name: 릴리즈 노트 생성
        if: steps.check.outputs.has_new == 'true' && steps.rebase.outputs.conflict == 'false'
        run: |
          git log ${{ steps.check.outputs.merge_base }}..upstream/master --oneline | head -10 > /tmp/upstream_log.txt
          DATE=${{ steps.tag.outputs.date }}
          {
            echo "## 한글 OSD 빌드 (${DATE})"
            echo ""
            echo "### 업스트림 신규 업데이트"
            cat /tmp/upstream_log.txt
            echo ""
            echo "### 한글 패치 내용"
            echo "- OSD 한글 파일명 표시 지원"
            echo "- 메뉴 한국어 로컬라이제이션"
            echo "- Galmuri8 한글 비트맵 폰트"
            echo "- 게임 목록 한글 깨짐 수정"
            echo ""
            echo "### 설치 방법"
            echo "1. MiSTer 파일을 SD카드 루트에 복사 (/media/fat/MiSTer)"
            echo "2. 또는 MiSTer OSD → Scripts → korean_update.sh 실행"
          } > /tmp/release_notes.md

      - name: GitHub 릴리즈 생성
        if: steps.check.outputs.has_new == 'true' && steps.rebase.outputs.conflict == 'false'
        run: |
          gh release create ${{ steps.tag.outputs.tag }} bin/MiSTer \
            --repo ${{ github.repository }} \
            --title "Korean OSD - ${{ steps.tag.outputs.date }}" \
            --notes-file /tmp/release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
